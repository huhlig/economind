version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  economind:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  duckdb_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # PostgreSQL — durable writes, migrations, portfolio state
  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-economind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB:       ${POSTGRES_DB:-economind}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - economind
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-economind}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Economind platform — API server + background scheduler
  economind:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:       postgresql://${POSTGRES_USER:-economind}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-economind}
      DUCKDB_PATH:        /data/economind.duckdb
      ECONOMIND_API_KEY:  ${ECONOMIND_API_KEY:?ECONOMIND_API_KEY must be set}
      ECONOMIND_BIND:     0.0.0.0:8080
      FRED_API_KEY:       ${FRED_API_KEY:-}
      SIMFIN_API_KEY:     ${SIMFIN_API_KEY:-}
      ANTHROPIC_API_KEY:  ${ANTHROPIC_API_KEY:-}
      RUST_LOG:           ${RUST_LOG:-economind=info,tower_http=warn}
    volumes:
      - duckdb_data:/data
      # Optional: mount a custom config file
      # - ./economind.toml:/app/economind.toml:ro
    networks:
      - economind
    ports:
      - "${ECONOMIND_PORT:-8080}:8080"
      - "${ECONOMIND_MCP_PORT:-8081}:8081"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
